<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport">
<title>Clearate - Share Rates</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@100..900&amp;display=swap" rel="stylesheet">
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Public Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .qr-gradient {
            background: linear-gradient(135deg, #131b2e 0%, #000000 100%);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#f7f9fb",
                        "on-surface": "#191c1e",
                        "secondary-container": "#d0e1fb",
                        "on-secondary": "#ffffff",
                        "secondary-fixed": "#d3e4fe",
                        "outline-variant": "#c6c6cd",
                        "surface-variant": "#e0e3e5",
                        "primary-container": "#131b2e",
                        "on-secondary-fixed": "#0b1c30",
                        "surface-bright": "#f7f9fb",
                        "on-background": "#191c1e",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-container": "#7c839b",
                        "surface-tint": "#565e74",
                        "secondary-fixed-dim": "#b7c8e1",
                        "inverse-on-surface": "#eff1f3",
                        "on-error": "#ffffff",
                        "inverse-surface": "#2d3133",
                        "surface-container-highest": "#e0e3e5",
                        "on-tertiary-fixed": "#271901",
                        "secondary": "#505f76",
                        "on-tertiary": "#ffffff",
                        "on-secondary-container": "#54647a",
                        "error-container": "#ffdad6",
                        "tertiary-container": "#271901",
                        "primary-fixed-dim": "#bec6e0",
                        "on-tertiary-fixed-variant": "#574425",
                        "surface-container-high": "#e6e8ea",
                        "on-primary": "#ffffff",
                        "tertiary-fixed": "#fcdeb5",
                        "surface": "#f7f9fb",
                        "outline": "#76777d",
                        "primary-fixed": "#dae2fd",
                        "surface-container-low": "#f2f4f6",
                        "tertiary-fixed-dim": "#dec29a",
                        "on-surface-variant": "#45464d",
                        "on-error-container": "#93000a",
                        "on-primary-fixed-variant": "#3f465c",
                        "surface-container": "#eceef0",
                        "surface-dim": "#d8dadc",
                        "tertiary": "#000000",
                        "on-tertiary-container": "#98805d",
                        "error": "#ba1a1a",
                        "primary": "#000000",
                        "on-secondary-fixed-variant": "#38485d",
                        "inverse-primary": "#bec6e0",
                        "on-primary-fixed": "#131b2e"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "xl": "32px",
                        "container-margin": "16px",
                        "touch-target": "48px",
                        "base": "8px",
                        "sm": "12px",
                        "md": "16px",
                        "lg": "24px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Public Sans"],
                        "headline-lg": ["Public Sans"],
                        "body-lg": ["Public Sans"],
                        "stat-lg": ["Public Sans"],
                        "headline-md": ["Public Sans"],
                        "label-md": ["Public Sans"],
                        "body-md": ["Public Sans"],
                        "display-lg": ["Public Sans"]
                    },
                    "fontSize": {
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "stat-lg": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "display-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-primary dark:bg-primary-container text-on-primary dark:text-on-primary-container flex justify-between items-center px-container-margin h-touch-target">
<div class="flex items-center">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/10 transition-colors active:opacity-80">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md-mobile ml-2">Share Rates</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/10 transition-colors active:opacity-80">
<span class="material-symbols-outlined">help_outline</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-24 pb-32 px-container-margin flex flex-col items-center">
<!-- QR Card Section -->
<div class="w-full max-w-sm">
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg flex flex-col items-center">
<!-- QR Code Visualization -->
<div class="relative w-64 h-64 bg-white p-4 rounded-lg flex items-center justify-center overflow-hidden">
<!-- Stylized QR Code using background pattern -->
<div class="w-full h-full opacity-90" style="background-image: radial-gradient(#131b2e 2px, transparent 2px); background-size: 8px 8px;"></div>
<div class="absolute inset-0 flex items-center justify-center">
<div class="w-24 h-24 bg-white rounded-xl shadow-lg border border-outline-variant flex items-center justify-center z-10">
<span class="material-symbols-outlined text-primary text-5xl">qr_code_2</span>
</div>
</div>
</div>
<!-- Status Indicator (Chip) -->
<div class="mt-lg flex items-center gap-2 bg-secondary-container/30 px-4 py-2 rounded-full border border-secondary-container">
<span class="w-2 h-2 bg-green-600 rounded-full animate-pulse"></span>
<span class="font-label-md text-label-md text-on-secondary-container">Rates updated 2 minutes ago</span>
</div>
<!-- Instructions -->
<div class="mt-lg text-center px-4">
<p class="font-body-md text-body-md text-on-surface-variant">
                        Others can scan this code to get the latest currency rates from your app instantly, no internet needed.
                    </p>
</div>
</div>
<!-- Action Button -->
<div class="mt-xl">
<button class="w-full h-touch-target bg-primary text-on-primary rounded-xl font-headline-md flex items-center justify-center gap-2 active:scale-95 transition-transform duration-150" id="refresh-btn">
<span class="material-symbols-outlined" id="refresh-icon">sync</span>
<span class="">Refresh Rates</span>
</button>
</div>
<!-- Secondary Share Options -->
<div class="mt-lg flex justify-center gap-md">
<button class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors font-label-md">
<span class="material-symbols-outlined">save_alt</span>
<span class="">Save Image</span>
</button>
<div class="w-[1px] h-4 bg-outline-variant self-center"></div>
<button class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors font-label-md">
<span class="material-symbols-outlined">share</span>
<span class="">Share Link</span>
</button>
</div>
</div>
</main>
<!-- BottomNavBar -->

<script>
        // Micro-interaction for Refresh Button
        const refreshBtn = document.getElementById('refresh-btn');
        const refreshIcon = document.getElementById('refresh-icon');

        refreshBtn.addEventListener('click', () => {
            refreshIcon.classList.add('animate-spin');
            refreshBtn.disabled = true;
            refreshBtn.classList.add('opacity-80');
            
            // Simulate refresh delay
            setTimeout(() => {
                refreshIcon.classList.remove('animate-spin');
                refreshBtn.disabled = false;
                refreshBtn.classList.remove('opacity-80');
                
                // Feedback toast or visual cue could go here
                console.log('Rates Refreshed');
            }, 1200);
        });

        // Toggle Dark Mode (Optional utility for demo)
        const toggleTheme = () => {
            document.documentElement.classList.toggle('dark');
        }
    </script>


</body></html>
