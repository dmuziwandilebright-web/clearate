<body class="bg-background text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="flex justify-between items-center h-16 px-container-margin w-full sticky top-0 z-50 shadow-sm bg-primary"><div class="flex items-center gap-md">

</section>
<!-- Verdict Card -->
<div class="bg-semantic-success-container border border-semantic-success/20 rounded-xl p-lg flex flex-col items-center text-center space-y-md success-glow transition-all duration-300 transform">
<div class="bg-semantic-success w-20 h-20 rounded-full flex items-center justify-center mb-base">
<span class="material-symbols-outlined text-white text-[48px]" data-icon="check_circle" style="font-variation-settings: &quot;FILL&quot; 1;">check_circle</span>
</div>
<div class="space-y-xs">
<span class="font-display-lg text-display-lg text-semantic-success block tracking-widest">FAIR</span>
<p class="font-body-lg text-body-lg text-semantic-success font-semibold px-md">
                    This price is honest. You are paying the correct official rate.
                </p>
</div>
<!-- Math Breakdown Area -->
<div class="w-full bg-white/60 rounded-lg p-md mt-lg border border-semantic-success/10">
<div class="flex justify-between items-center font-label-md text-label-md uppercase tracking-tighter text-on-surface-variant">
<span class="">Official Bank</span>
<span class="">Your Payment</span>
</div>
<div class="flex justify-between items-center font-stat-lg text-stat-lg text-on-surface mt-xs">
<span class="">$10.00</span>
<span class="text-semantic-success">$10.00</span>
</div>
</div>
</div>
<!-- Detail Insights -->
<div class="bg-white border border-outline-variant rounded-xl p-md space-y-md">
<div class="flex items-start gap-md">
<div class="bg-surface-container-low p-sm rounded-lg">
<span class="material-symbols-outlined text-on-secondary-container" data-icon="verified_user">verified_user</span>
</div>
<div class="flex-1">
<h4 class="font-headline-md text-headline-md text-on-surface">No Hidden Fees</h4>
<p class="font-body-md text-body-md text-on-surface-variant">The markup on this transaction is 0.0%. This matches the mid-market exchange rate.</p>
</div>
</div>
</div>

<script>
        // Simple ripple-like effect on verdict card click
        const card = document.querySelector('.bg-semantic-success-container');
        card.addEventListener('click', () => {
            card.classList.add('scale-[1.02]');
            setTimeout(() => card.classList.remove('scale-[1.02]'), 200);
        });
    </script>
