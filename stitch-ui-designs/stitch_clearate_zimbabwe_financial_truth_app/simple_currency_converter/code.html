<body class="bg-background text-on-background min-h-screen pb-20">
<!-- TopAppBar -->
<header class="bg-primary dark:bg-surface-container-highest flex justify-between items-center px-container-margin h-touch-target w-full z-50 fixed top-0 left-0">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-on-primary dark:text-on-surface" data-icon="account_balance_wallet">account_balance_wallet</span>
<h1 class="text-headline-md font-headline-md font-bold text-on-primary dark:text-on-surface">Clearate</h1>
</div>
<button class="hover:opacity-90 transition-transform duration-200 active:scale-95">
<span class="material-symbols-outlined text-on-primary dark:text-on-surface" data-icon="sync">sync</span>
</button>
</header>
<main class="pt-20 px-container-margin max-w-lg mx-auto flex flex-col gap-lg">
<!-- Section Header -->
<div class="mt-base">
<h2 class="text-headline-lg-mobile font-headline-lg-mobile text-on-surface">Currency Converter</h2>
<p class="text-body-md font-body-md text-on-surface-variant">Instant, accurate exchange calculations.</p>
</div>
<!-- Converter Interface -->
<div class="relative flex flex-col gap-sm">
<!-- Source Card -->
<div class="bg-surface-container-lowest border border-outline-variant p-md rounded-xl shadow-sm p-lg border-2">
<div class="flex justify-between items-center mb-xs">
<span class="text-label-md font-label-md text-on-surface-variant">Money You Have</span>
<select class="bg-transparent border-none text-headline-md font-headline-md text-primary focus:ring-0 cursor-pointer pr-8 appearance-none text-headline-lg font-bold bg-surface-container-high rounded-lg px-2">
<option value="USD">USD</option>
<option value="ZAR">ZAR</option>
<option value="ZiG">ZiG</option>
</select>
</div>
<div class="flex items-center justify-between">
<span class="text-stat-lg font-stat-lg text-primary truncate text-display-lg font-bold" id="source-amount">0</span>
<div class="w-1.5 h-10 bg-primary rounded-full animate-pulse ml-2"></div>
</div>
</div>
<!-- Swap Button -->
<div class="absolute left-1/2 -translate-x-1/2 top-1/2 -translate-y-1/2 z-10">
<button class="bg-primary text-on-primary w-12 h-12 rounded-full flex items-center justify-center shadow-md active:scale-90 transition-transform" onclick="handleSwap()">
<span class="material-symbols-outlined" data-icon="swap_vert">swap_vert</span>
</button>
</div>
<!-- Destination Card -->
<div class="bg-surface-container-low border border-outline-variant p-md rounded-xl shadow-sm p-lg border-2">
<div class="flex justify-between items-center mb-xs">
<span class="text-label-md font-label-md text-on-surface-variant">Money You Get</span>
<select class="bg-transparent border-none text-headline-md font-headline-md text-primary focus:ring-0 cursor-pointer pr-8 appearance-none text-headline-lg font-bold bg-surface-container-high rounded-lg px-2">
<option value="ZAR">ZAR</option>
<option value="USD">USD</option>
<option value="ZiG">ZiG</option>
</select>
</div>
<div class="flex items-center">
<span class="text-stat-lg font-stat-lg text-on-surface-variant truncate text-display-lg font-bold text-on-surface" id="target-amount">0.00</span>
</div>
</div>
</div>
<!-- Quick Amount Chips -->
<div class="flex flex-wrap gap-sm justify-between">





</div>
<!-- Integrated Keypad -->
<div class="grid grid-cols-3 gap-sm bg-surface-container-highest/30 p-sm rounded-xl border border-outline-variant">
<button class="active-key h-16 bg-surface-container-lowest rounded-xl flex items-center justify-center text-headline-md font-headline-md shadow-sm h-20 text-display-lg border-2 border-outline-variant" onclick="appendDigit(1)">1</button>
<button class="active-key h-16 bg-surface-container-lowest rounded-xl flex items-center justify-center text-headline-md font-headline-md shadow-sm h-20 text-display-lg border-2 border-outline-variant" onclick="appendDigit(2)">2</button>
<button class="active-key h-16 bg-surface-container-lowest rounded-xl flex items-center justify-center text-headline-md font-headline-md shadow-sm h-20 text-display-lg border-2 border-outline-variant" onclick="appendDigit(3)">3</button>

<button class="active-key h-16 bg-surface-container-lowest rounded-xl flex items-center justify-center text-headline-md font-headline-md shadow-sm h-20 text-display-lg border-2 border-outline-variant" onclick="appendDigit(6)">6</button>
<button class="active-key h-16 bg-surface-container-lowest rounded-xl flex items-center justify-center text-headline-md font-headline-md shadow-sm h-20 text-display-lg border-2 border-outline-variant" onclick="appendDigit(7)">7</button>
<button class="active-key h-16 bg-surface-container-lowest rounded-xl flex items-center justify-center text-headline-md font-headline-md shadow-sm h-20 text-display-lg border-2 border-outline-variant" onclick="appendDigit(8)">8</button>
<button class="active-key h-16 bg-surface-container-lowest rounded-xl flex items-center justify-center text-headline-md font-headline-md shadow-sm h-20 text-display-lg border-2 border-outline-variant" onclick="appendDigit(9)">9</button>
<button class="active-key h-16 bg-surface-container-lowest rounded-xl flex items-center justify-center text-headline-md font-headline-md shadow-sm h-20 text-display-lg border-2 border-outline-variant" onclick="appendDigit('.')">.</button>

<span class="material-symbols-outlined" data-icon="trending_up">trending_up</span>

<span class="material-symbols-outlined" data-icon="gavel">gavel</span>
<span class="text-label-md font-label-md">Price Check</span>
</a>

<span class="material-symbols-outlined" data-icon="currency_exchange" style="font-variation-settings: &quot;FILL&quot; 1;">currency_exchange</span>
<span class="text-label-md font-label-md">Converter</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-4 py-1 hover:bg-surface-container-high dark:hover:bg-surface-container-highest transition-all duration-150" href="#">
<span class="material-symbols-outlined" data-icon="more_horiz">more_horiz</span>
<span class="text-label-md font-label-md">More</span>
</a>
</nav>
<script>
        let currentAmountStr = "0";
        const sourceDisplay = document.getElementById('source-amount');
        const targetDisplay = document.getElementById('target-amount');
        const exchangeRate = 18.42; // Mock USD to ZAR rate

        function updateConversion() {
            const amount = parseFloat(currentAmountStr) || 0;
            const converted = amount * exchangeRate;
            targetDisplay.innerText = converted.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            sourceDisplay.innerText = amount === 0 ? "0" : amount.toLocaleString();
        }

        function appendDigit(digit) {
            if (currentAmountStr === "0" && digit !== '.') {
                currentAmountStr = digit.toString();
            } else {
                if (digit === '.' && currentAmountStr.includes('.')) return;
                if (currentAmountStr.length > 9) return; // Prevent overflow
                currentAmountStr += digit.toString();
            }
            updateConversion();
        }

        function clearAmount() {
            currentAmountStr = "0";
            updateConversion();
        }

        function updateAmount(val) {
            currentAmountStr = val.toString();
            updateConversion();
        }

        function handleSwap() {
            // Logic for visual feedback only in this demo
            const container = document.querySelector('main');
            container.classList.add('opacity-50');
            setTimeout(() => {
                container.classList.remove('opacity-50');
            }, 100);
        }

        // Initialize display
        updateConversion();
    </script>
