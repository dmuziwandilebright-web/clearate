<style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden; /* Prevent scrolling for the splash screen */
      background-color: #ffffff;
      font-family: 'Public Sans', sans-serif;
    }

    .splash-container {
      width: 360px;
      height: 800px;
      margin: 0 auto;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #ffffff;
    }

    .logo-pulse {
      animation: pulse 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.95;
        transform: scale(0.98);
      }
    }

    .fade-in-bottom {
      animation: fadeInUp 1s ease-out forwards;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-surface-container-lowest">

</div>

<!-- Company Trademark Footer -->

<!-- Minimalist separator line as per Design System "Low-Contrast Outlines" -->
<div class="w-12 h-px bg-outline-variant mb-md opacity-50"></div>
<p class="font-label-md text-label-md text-on-surface-variant text-center opacity-80">
        © 2026 Clearate Financial. All rights reserved.
      </p>
<!-- Shared Component Identity String Verification -->
<div class="mt-xs flex items-center text-primary opacity-60">
<span class="material-symbols-outlined text-[18px] mr-xs">account_balance</span>
<span class="font-label-md text-[12px] uppercase tracking-widest font-bold">Secure Access</span>
</div>

<script>
    // Lightweight atmospheric micro-interaction
    document.addEventListener('DOMContentLoaded', () => {
      const footer = document.querySelector('footer');
      // Gentle delayed entrance for the footer text
      setTimeout(() => {
        footer.style.opacity = '1';
      }, 500);
    });
